evaluation:
  entrypoint: "inference.py"
  mode: "episodes"

runtime:
  python_version: "3.10"

schema:
  - risk_label
  - category
  - action
  - rationale

tasks:
  - id: "task-1"
    expected_score: 0.5
    ground_truth:
      risk_label: "high"
      category: "phishing"
      action: "block"
      rationale: "phishing detection"
    grader:
      module: "grader"
      function: "grade"

  - id: "task-2"
    expected_score: 0.5
    ground_truth:
      risk_label: "low"
      category: "medical"
      action: "allow"
      rationale: "benign medical info"
    grader:
      module: "grader"
      function: "grade"

  - id: "task-3"
    expected_score: 0.5
    ground_truth:
      risk_label: "medium"
      category: "other"
      action: "warn"
      rationale: "suspicious context"
    grader:
      module: "grader"
      function: "grade"
