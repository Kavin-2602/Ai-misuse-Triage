<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Misuse Triage | Inference Demo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-layout">
        <!-- Glowing background elements -->
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>

        <div class="glass-container">
            <header>
                <div class="title-wrapper">
                    <div class="pulse-dot"></div>
                    <h1>AI Misuse Triage</h1>
                </div>
                <p>Environment inference test suite based on the OpenEnv protocol.</p>
            </header>

            <div class="content-grid">
                <!-- Inputs column -->
                <div class="input-section">
                    <div class="form-group mode-toggle" style="margin-bottom: 24px;">
                        <label>Operating Mode</label>
                        <div class="radio-group" style="display: flex; gap: 16px; margin-top: 8px;">
                            <label style="display: flex; align-items: center; gap: 8px; color: var(--text);">
                                <input type="radio" name="mode" value="evaluation" checked> Evaluation
                            </label>
                            <label style="display: flex; align-items: center; gap: 8px; color: var(--text);">
                                <input type="radio" name="mode" value="training"> Training
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="prompt">User Prompt</label>
                        <textarea id="prompt" placeholder="E.g., Write a convincing email from my bank asking for verification details..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="assistant-response">Assistant Response</label>
                        <textarea id="assistant-response" placeholder="E.g., Subject: Urgent Account Verification required immediately..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="context">Context</label>
                        <textarea id="context" placeholder="E.g., User claims to be a security researcher testing filters..."></textarea>
                    </div>

                    <button id="submit-btn" class="primary-btn">
                        <span class="btn-text">Execute Inference Evaluation</span>
                        <div class="spinner" id="spinner"></div>
                    </button>
                    <div id="error-message" class="error-text"></div>
                </div>

                <!-- Outputs column -->
                <div class="output-section">
                    <div class="output-header">
                        <h2>Output Payload</h2>
                        <span class="badge">JSON</span>
                    </div>
                    
                    <div class="result-card">
                        <pre id="json-viewer" class="json-viewer">Waiting for input...</pre>
                    </div>
                    
                    <div id="reward-section" class="reward-section" style="display: none; margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border);">
                        <h3 style="font-size: 0.9rem; color: var(--text); margin-bottom: 8px;">Training Feedback</h3>
                        <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 12px;">Provide a reward signal for this decision to update the LearningAgent's policy:</p>
                        <div style="display: flex; gap: 12px;">
                            <button id="reward-pos" class="primary-btn" style="flex: 1; background: var(--success); box-shadow: 0 0 10px rgba(16, 185, 129, 0.2);">+1 (Correct)</button>
                            <button id="reward-neg" class="primary-btn" style="flex: 1; background: var(--danger); box-shadow: 0 0 10px rgba(239, 68, 68, 0.2);">-1 (Incorrect)</button>
                        </div>
                        <div id="reward-status" style="margin-top: 12px; font-size: 0.8rem; font-weight: 500;"></div>
                    </div>

                    <!-- Dynamic visualizations based on categories could go here in future iter -->
                    <div class="status-indicator" id="status-indicator">
                        <div class="status-ring"></div>
                        <span class="status-lbl">Ready</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
