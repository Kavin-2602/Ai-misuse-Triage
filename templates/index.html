<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Misuse Triage | Advanced Environment</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>
<body>
    <div class="ambient-glow"></div>
    <div class="dashboard-container">
        <!-- Header -->
        <header class="header-area">
            <div class="title-group">
                <h1>AI Misuse Triage</h1>
                <p>OpenEnv Interactive Telemetry Dashboard</p>
            </div>
            <div class="status-badge">
                <div class="status-dot"></div>
                System Active
            </div>
        </header>

        <!-- Input Column -->
        <div class="input-panel">
            <div class="form-group">
                <label>System Mode</label>
                <div class="segmented-control">
                    <input type="radio" id="mode-evaluation" name="mode" value="evaluation" checked>
                    <label for="mode-evaluation">Evaluation</label>
                    <input type="radio" id="mode-training" name="mode" value="training">
                    <label for="mode-training">Training</label>
                    <div class="slider"></div>
                </div>
            </div>

            <div class="form-group">
                <label>User Prompt</label>
                <div class="textarea-wrapper">
                    <textarea id="prompt" placeholder="Intercepted user prompt... E.g., 'Write a convincing phishing email...'"></textarea>
                </div>
            </div>

            <div class="form-group">
                <label>Assistant Response</label>
                <div class="textarea-wrapper">
                    <textarea id="assistant-response" placeholder="Intercepted assistant generation..."></textarea>
                </div>
            </div>

            <div class="form-group">
                <label>Telemetry Context</label>
                <div class="textarea-wrapper">
                    <textarea id="context" placeholder="Additional user tracking details..."></textarea>
                </div>
            </div>

            <button id="submit-btn" class="btn-primary">
                <span class="btn-text">Execute Policy Analysis</span>
                <div class="loader" id="loader"></div>
            </button>
            <div id="error-message" class="error-text"></div>
        </div>

        <!-- Output Column -->
        <div class="output-panel">
            <!-- Dynamic Result Card -->
            <div class="ticket-card" id="ticket-card">
                <!-- Idle State Default Content -->
                <div id="idle-ui" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); opacity: 0.6; text-align: center; gap: 10px;">
                    <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    <span>Awaiting Telemetry Data</span>
                </div>

                <!-- Skeleton Loader State -->
                <div id="loading-ui" style="display: none;">
                    <div class="ticket-header">
                        <div class="sk-title skeleton" style="margin: 0; width: 120px; height: 20px;"></div>
                        <div class="ticket-badges">
                            <div class="skeleton" style="width: 70px; height: 24px;"></div>
                            <div class="skeleton" style="width: 70px; height: 24px;"></div>
                        </div>
                    </div>
                    <div class="rationale-block" style="margin-top: 20px;">
                        <div class="sk-title skeleton"></div>
                        <div class="sk-text skeleton"></div>
                        <div class="sk-text skeleton"></div>
                        <div class="sk-text short skeleton"></div>
                    </div>
                </div>

                <!-- Result State -->
                <div id="result-ui" style="display: none; height: 100%; flex-direction: column;">
                    <div class="ticket-header">
                        <div class="ticket-id" id="ticket-id">EP-#####</div>
                        <div class="ticket-badges">
                            <div id="badge-category" class="badge">Category</div>
                            <div id="badge-risk" class="badge">Risk</div>
                            <div id="badge-action" class="badge badge-action">Action</div>
                        </div>
                    </div>
                    <div class="rationale-block" style="margin-top: 1.5rem;">
                        <div class="rationale-label">Agent Rationale</div>
                        <div class="rationale-text" id="rationale-text"></div>
                    </div>
                </div>
            </div>

            <!-- Training Reward Feedback -->
            <div id="reward-section" class="reward-panel" style="display: none;">
                <button id="reward-pos" class="btn-reward pos">+1 Accept Rationale</button>
                <button id="reward-neg" class="btn-reward neg">-1 Reject Decision</button>
            </div>
            <div id="reward-status" style="margin-top: -10px; font-size: 0.85rem; font-weight: 500; text-align: center;"></div>

            <!-- Raw JSON Payload Terminal -->
            <div class="terminal-block">
                <div class="terminal-header">
                    <div class="term-dot r"></div><div class="term-dot y"></div><div class="term-dot g"></div>
                </div>
                <pre id="json-viewer" style="margin:0;">> system ready
> waiting for openenv payload...</pre>
            </div>
        </div>
    </div>
    
    <script src="{{ url_for('static', path='script.js') }}"></script>
</body>
</html>
